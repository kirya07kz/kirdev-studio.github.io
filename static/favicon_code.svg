<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background: Pure Solid Black Rounded Square -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="#000000" stroke="#ffffff" stroke-width="16" />

  <!-- Code Bracket Graphics (Sleek High Contrast Black & White) -->
  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left Bracket: < -->
    <path d="M 190 160 L 90 256 L 190 352" stroke-width="40" />

    <!-- Right Bracket: > -->
    <path d="M 322 160 L 422 256 L 322 352" stroke-width="40" />

    <!-- Central Slash: / -->
    <line x1="280" y1="130" x2="232" y2="382" stroke-width="40" />
  </g>
</svg>