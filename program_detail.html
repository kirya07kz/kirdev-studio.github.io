<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скачать бесплатно на KirDev Studio</title>
    <meta name="description" content="">
    <link rel="icon" type="image/svg+xml" href="static/favicon_code.svg?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css?v=1.4">
</head>
<body>
    <div class="glow-orb"></div>
    <div class="glow-orb orb-2"></div>
    
    <header class="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">KirDev <span>Studio</span></a>
            <button class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="nav" id="nav-links">
                <a href="index.html">Главная</a>
                <a href="programs.html">Программы</a>
                <a href="https://t.me/kirdev_studio" target="_blank" rel="noopener noreferrer" class="btn-primary">Telegram канал</a>
            </nav>
        </div>
    </header>

    <main>
        <section style="padding-top: 150px; padding-bottom: 100px;">
            <div class="container" style="max-width: 900px;" id="detail-container">
                <!-- Будет загружено динамически через JS -->
                 <div style="text-align: center; padding: 100px 0; color: var(--text-secondary);">
                     <p>Загрузка информации о программе...</p>
                 </div>
            </div>
        </section>

        <!-- Lightbox Overlay (Full Screen) -->
        <div id="lightbox"
            style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); z-index: 1000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;">
            <!-- Close Button -->
            <button id="lightbox-close"
                style="position: absolute; top: 24px; right: 24px; background: transparent; border: none; color: #fff; cursor: pointer; font-size: 2.5rem; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; outline: none; transition: transform 0.2s ease; z-index: 1010;">&times;</button>

            <!-- Prev Button -->
            <button id="lightbox-prev" class="lightbox-btn" aria-label="Предыдущий скриншот">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>

            <!-- Image Wrapper for smooth transitions -->
            <div
                style="position: relative; width: 92%; height: 88%; display: flex; align-items: center; justify-content: center;">
                <img id="lightbox-img" src="" alt="Увеличенный скриншот"
                    style="max-width: 100%; max-height: 100%; width: auto; height: auto; object-fit: contain; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 50px rgba(0,0,0,0.5); transform: scale(0.95); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.2s ease; cursor: pointer;">
            </div>

            <!-- Next Button -->
            <button id="lightbox-next" class="lightbox-btn" aria-label="Следующий скриншот">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <h2>KirDev Studio</h2>
                    <p>Надежные и безопасные программы для ваших задач.</p>
                </div>
                <div class="footer-links">
                    <p>&copy; 2026 KirDev Studio. Все права защищены.</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Подключаем базу программ -->
    <script src="static/js/programs.js"></script>

    <script>
        // Меню
        const mobileMenu = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('nav-links');

        mobileMenu.addEventListener('click', () => {
            mobileMenu.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        document.querySelectorAll('.nav a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.remove('active');
                navLinks.classList.remove('active');
            });
        });

        // Загрузка деталей
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('detail-container');
            
            // Получаем ID из query-параметров
            const urlParams = new URLSearchParams(window.location.search);
            const programId = parseInt(urlParams.get('id'));
            
            if (isNaN(programId)) {
                window.location.href = '404.html';
                return;
            }
            
            // Ищем программу
            const program = PROGRAMS.find(p => p.id === programId);
            
            if (!program) {
                window.location.href = '404.html';
                return;
            }

            // Устанавливаем мета-теги и заголовок
            document.title = `${program.name} — Скачать бесплатно на KirDev Studio`;
            const metaDesc = document.querySelector('meta[name="description"]');
            if (metaDesc) metaDesc.setAttribute('content', program.description);

            // Генерируем разметку
            let featuresHtml = '';
            program.features.forEach(f => {
                featuresHtml += `<li style="margin-bottom: 8px;">${f}</li>`;
            });

            const isExternal = program.link.startsWith('http://') || program.link.startsWith('https://');
            const downloadUrl = isExternal ? program.link : `downloads/${program.link}`;
            const linkAttributes = isExternal 
                ? 'target="_blank" rel="noopener noreferrer"' 
                : 'download';

            container.innerHTML = `
                <a href="programs.html"
                    style="color: var(--text-secondary); text-decoration: none; display: inline-block; margin-bottom: 30px;">
                    &larr; Назад к программам
                </a>

                <!-- Cover Banner -->
                <div class="detail-banner"
                    style="width: 100%; height: 280px; overflow: hidden; border-radius: 16px; border: 1px solid var(--border-color); margin-bottom: 40px; background: #000;">
                    <img src="${program.cover_image}" alt="Баннер ${program.name}"
                        style="width: 100%; height: 100%; object-fit: cover; object-position: top;">
                </div>

                <div class="detail-header">
                    <div class="detail-title">
                        <h1>${program.name}</h1>
                        <div style="display: flex; align-items: center; gap: 12px; margin-top: 10px; flex-wrap: wrap;">
                            <span class="badge"
                                style="font-size: 0.9rem; background: rgba(255,255,255,0.15); color: #fff;">Версия ${program.version}</span>
                            <span class="badge"
                                style="font-size: 0.9rem; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-secondary);">${program.category}</span>
                            <span
                                style="font-size: 0.9rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px;"
                                title="Количество скачиваний">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                Скачано: <span id="detail-download-counter">${program.download_count}</span> раз
                            </span>
                        </div>
                    </div>
                    <a href="${downloadUrl}" ${linkAttributes} class="btn-primary lg">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Скачать безопасно
                    </a>
                </div>

                <div class="detail-card" style="margin-bottom: 50px;">
                    <h2 style="font-size: 1.5rem; margin-bottom: 20px;">О программе</h2>
                    <p style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px;">
                        ${program.full_description}
                    </p>

                    <h3 style="font-size: 1.25rem; margin-bottom: 16px;">Ключевые возможности:</h3>
                    <ul
                        style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.8; list-style-position: inside; margin-bottom: 0;">
                        ${featuresHtml}
                    </ul>
                </div>

                <!-- Скриншоты в виде единого слайдера (Карусели) -->
                <h2 style="font-size: 1.5rem; margin-bottom: 24px;">Скриншоты</h2>
                <div class="screenshots-carousel"
                    style="position: relative; width: 100%; max-width: 100%; margin: 0 auto; aspect-ratio: 16/9; border-radius: 16px; border: 1px solid var(--border-color); overflow: hidden; background: #0a0a0a; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">

                    <!-- Slides Container -->
                    <div class="carousel-slides" id="carousel-slides" style="width: 100%; height: 100%; display: flex; position: relative;">
                        <!-- Будет заполнено через JS -->
                    </div>

                    <!-- Navigation Buttons (In-page) -->
                    <button class="carousel-btn prev" aria-label="Предыдущий слайд"
                        style="position: absolute; left: 20px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; outline: none; z-index: 10;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                    </button>
                    <button class="carousel-btn next" aria-label="Следующий слайд"
                        style="position: absolute; right: 20px; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; outline: none; z-index: 10;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>

                    <!-- Dots (In-page) -->
                    <div class="carousel-dots" id="carousel-dots"
                        style="position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10;">
                        <!-- Будет заполнено через JS -->
                    </div>
                </div>
            `;

            // Заполняем слайдер скриншотов
            const slidesContainer = document.getElementById('carousel-slides');
            const dotsContainer = document.getElementById('carousel-dots');
            
            if (program.screenshots && program.screenshots.length > 0) {
                program.screenshots.forEach((shot, index) => {
                    // Создаем слайд
                    const slide = document.createElement('div');
                    slide.className = 'carousel-slide';
                    slide.style.width = '100%';
                    slide.style.height = '100%';
                    slide.style.flexShrink = '0';
                    slide.style.display = index === 0 ? 'flex' : 'none';
                    slide.style.alignItems = 'center';
                    slide.style.justifyContent = 'center';
                    slide.style.position = 'relative';
                    slide.innerHTML = `
                        <img src="${shot}" alt="Скриншот ${program.name}"
                            style="width: 100%; height: 100%; object-fit: contain; cursor: zoom-in; transition: transform 0.3s ease;"
                            class="screenshot-img"
                            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <div class="screenshot-fallback"
                            style="display: none; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 0.9rem; text-align: center; padding: 20px;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 8px;">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <circle cx="8.5" cy="8.5" r="1.5"></circle>
                                <polyline points="21 15 16 10 5 21"></polyline>
                            </svg>
                            <span>Скриншот скоро появится</span>
                        </div>
                    `;
                    slidesContainer.appendChild(slide);

                    // Создаем точку
                    const dot = document.createElement('span');
                    dot.className = `carousel-dot ${index === 0 ? 'active' : ''}`;
                    dot.setAttribute('data-index', index);
                    dot.style.width = index === 0 ? '20px' : '8px';
                    dot.style.height = '8px';
                    dot.style.borderRadius = index === 0 ? '4px' : '50%';
                    dot.style.background = index === 0 ? '#fff' : 'rgba(255, 255, 255, 0.3)';
                    dot.style.cursor = 'pointer';
                    dot.style.transition = 'all 0.2s ease';
                    dotsContainer.appendChild(dot);
                });
            } else {
                // Если скриншотов нет вообще
                const slide = document.createElement('div');
                slide.className = 'carousel-slide';
                slide.style.width = '100%';
                slide.style.height = '100%';
                slide.style.display = 'flex';
                slide.style.alignItems = 'center';
                slide.style.justifyContent = 'center';
                slide.innerHTML = `
                    <div class="screenshot-fallback" style="display: flex; flex-direction: column; align-items: center; justify-content: center; color: #444; font-size: 0.9rem; text-align: center; padding: 20px;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 8px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                        <span>Скриншот скоро появится</span>
                    </div>
                `;
                slidesContainer.appendChild(slide);
            }

            // Инициализация карусели и лайтбокса
            initCarouselAndLightbox();
            updateDownloadCounters();
        });

        function initCarouselAndLightbox() {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const closeBtn = document.getElementById('lightbox-close');
            const prevBtn = document.getElementById('lightbox-prev');
            const nextBtn = document.getElementById('lightbox-next');

            const carouselSlides = document.querySelectorAll('.carousel-slide');
            const carouselDots = document.querySelectorAll('.carousel-dot');
            const carouselPrev = document.querySelector('.carousel-btn.prev');
            const carouselNext = document.querySelector('.carousel-btn.next');

            let carouselIndex = 0;

            const showCarouselImage = (index) => {
                if (carouselSlides.length === 0) return;

                if (index < 0) {
                    carouselIndex = carouselSlides.length - 1;
                } else if (index >= carouselSlides.length) {
                    carouselIndex = 0;
                } else {
                    carouselIndex = index;
                }

                carouselSlides.forEach((slide, idx) => {
                    slide.style.display = idx === carouselIndex ? 'flex' : 'none';
                });

                carouselDots.forEach((dot, idx) => {
                    if (idx === carouselIndex) {
                        dot.classList.add('active');
                        dot.style.background = '#fff';
                        dot.style.width = '20px';
                        dot.style.borderRadius = '4px';
                    } else {
                        dot.classList.remove('active');
                        dot.style.background = 'rgba(255, 255, 255, 0.3)';
                        dot.style.width = '8px';
                        dot.style.borderRadius = '50%';
                    }
                });
            };

            // Инициализация первого слайда
            showCarouselImage(0);

            if (carouselSlides.length <= 1) {
                if (carouselPrev) carouselPrev.style.display = 'none';
                if (carouselNext) carouselNext.style.display = 'none';
                const dotsContainer = document.querySelector('.carousel-dots');
                if (dotsContainer) dotsContainer.style.display = 'none';
            }

            if (carouselPrev) {
                carouselPrev.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showCarouselImage(carouselIndex - 1);
                });
            }

            if (carouselNext) {
                carouselNext.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showCarouselImage(carouselIndex + 1);
                });
            }

            carouselDots.forEach(dot => {
                dot.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(dot.getAttribute('data-index'));
                    showCarouselImage(idx);
                });
            });

            // Лайтбокс
            const screenshots = Array.from(document.querySelectorAll('.screenshot-img'))
                .filter(img => img.style.display !== 'none')
                .map(img => img.src);
            let currentIndex = 0;

            const showImage = (index) => {
                if (screenshots.length === 0) return;

                if (index < 0) {
                    currentIndex = screenshots.length - 1;
                } else if (index >= screenshots.length) {
                    currentIndex = 0;
                } else {
                    currentIndex = index;
                }

                showCarouselImage(currentIndex);

                lightboxImg.style.opacity = '0';
                lightboxImg.style.transform = 'scale(0.98)';

                setTimeout(() => {
                    lightboxImg.src = screenshots[currentIndex];
                    lightboxImg.style.opacity = '1';
                    lightboxImg.style.transform = 'scale(1)';
                }, 150);

                if (screenshots.length <= 1) {
                    prevBtn.style.display = 'none';
                    nextBtn.style.display = 'none';
                } else {
                    prevBtn.style.display = 'flex';
                    nextBtn.style.display = 'flex';
                }
            };

            document.querySelectorAll('.screenshot-img').forEach((img) => {
                img.addEventListener('click', () => {
                    const activeScreenshots = Array.from(document.querySelectorAll('.screenshot-img'))
                        .filter(i => i.style.display !== 'none')
                        .map(i => i.src);

                    const activeIndex = activeScreenshots.indexOf(img.src);

                    screenshots.length = 0;
                    screenshots.push(...activeScreenshots);

                    lightbox.style.display = 'flex';
                    showImage(activeIndex);

                    setTimeout(() => {
                        lightbox.style.opacity = '1';
                    }, 10);
                });
            });

            const closeLightbox = () => {
                lightbox.style.opacity = '0';
                lightboxImg.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    lightbox.style.display = 'none';
                }, 300);
            };

            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) {
                    closeLightbox();
                }
            });

            closeBtn.addEventListener('click', closeLightbox);

            prevBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showImage(currentIndex - 1);
            });

            nextBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                showImage(currentIndex + 1);
            });

            lightboxImg.addEventListener('click', (e) => {
                e.stopPropagation();
                if (screenshots.length > 1) {
                    showImage(currentIndex + 1);
                }
            });

            document.addEventListener('keydown', (e) => {
                if (lightbox.style.display === 'flex') {
                    if (e.key === 'Escape') {
                        closeLightbox();
                    } else if (e.key === 'ArrowLeft') {
                        showImage(currentIndex - 1);
                    } else if (e.key === 'ArrowRight') {
                        showImage(currentIndex + 1);
                    }
                }
            });
        }
    </script>
</body>
</html>
